name: Terraform Destroy - Iceberg ETL Pipeline

on:
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: "Type 'confirm' to destroy infrastructure"
        required: true
        default: ""

jobs:
  terraform-destroy:
    if: github.actor == 'Karasu1t'
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ap-northeast-1
      TF_DIR: terraform/env/dev/aws
    steps:
      - name: Confirm Destruction
        if: github.event.inputs.confirm_destroy != 'confirm'
        run: |
          echo "ERROR: Must type 'confirm' to destroy infrastructure"
          exit 1

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1

      - name: Write ~/.aws/credentials
        run: |
          mkdir -p ~/.aws
          {
            echo "[default]"
            echo "aws_access_key_id=${AWS_ACCESS_KEY_ID}"
            echo "aws_secret_access_key=${AWS_SECRET_ACCESS_KEY}"
            if [ -n "${AWS_SESSION_TOKEN:-}" ]; then
              echo "aws_session_token=${AWS_SESSION_TOKEN}"
            fi
          } > ~/.aws/credentials

      - name: Debug - Check directory structure
        run: |
          echo "Current working directory: $(pwd)"
          echo "Repository root contents:"
          ls -la
          echo ""
          echo "Terraform directory check:"
          if [ -d "${TF_DIR}" ]; then
            echo "✓ ${TF_DIR} exists"
            ls -la "${TF_DIR}"
          else
            echo "✗ ${TF_DIR} NOT FOUND"
            echo "Checking terraform/ directory:"
            ls -la terraform/ || echo "terraform/ does not exist"
          fi

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: cd "${TF_DIR}" && terraform init

      - name: Terraform Destroy
        run: cd "${TF_DIR}" && terraform destroy -auto-approve
