name: Terraform Apply - Iceberg ETL Pipeline

on:
  push:
    paths:
      - "terraform/modules/**"
      - "terraform/env/dev/aws/**"
      - "src/glue/**"
    branches:
      - main
  workflow_dispatch:

jobs:
  terraform:
    if: github.actor == 'Karasu1t'
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ap-northeast-1
      TF_DIR: terraform/env/dev/aws
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1

      - name: Write ~/.aws/credentials
        run: |
          mkdir -p ~/.aws
          {
            echo "[default]"
            echo "aws_access_key_id=${AWS_ACCESS_KEY_ID}"
            echo "aws_secret_access_key=${AWS_SECRET_ACCESS_KEY}"
            if [ -n "${AWS_SESSION_TOKEN:-}" ]; then
              echo "aws_session_token=${AWS_SESSION_TOKEN}"
            fi
          } > ~/.aws/credentials

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: cd "${TF_DIR}" && terraform init

      - name: Terraform Plan
        run: cd "${TF_DIR}" && terraform plan -out=tfplan

      - name: Terraform Apply
        run: cd "${TF_DIR}" && terraform apply -auto-approve tfplan
