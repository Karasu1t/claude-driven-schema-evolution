name: Terraform Apply - Iceberg ETL Pipeline

on:
  push:
    paths:
      - "terraform/modules/**"
      - "terraform/env/dev/aws/**"
      - "src/glue/**"
    branches:
      - main
  workflow_dispatch:

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/env/dev/aws
    env:
      AWS_REGION: ap-northeast-1
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1

      - name: Write ~/.aws/credentials
        run: |
          mkdir -p ~/.aws
          {
            echo "[default]"
            echo "aws_access_key_id=${AWS_ACCESS_KEY_ID}"
            echo "aws_secret_access_key=${AWS_SECRET_ACCESS_KEY}"
            if [ -n "${AWS_SESSION_TOKEN:-}" ]; then
              echo "aws_session_token=${AWS_SESSION_TOKEN}"
            fi
          } > ~/.aws/credentials

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Output Deployment Summary
        run: |
          echo "=== Iceberg ETL Pipeline Deployed ===" 
          echo "Region: ap-northeast-1"
          echo "Database: dev_karasuit_iceberg_db"
          echo "Table: video_advertisement"
          echo "Warehouse: s3://dev-karasuit-processed-bucket/iceberg-warehouse/"
          echo ""
          echo "Next: Upload test CSV to s3://dev-karasuit-raw-bucket/_YYYYMMDD.csv"
