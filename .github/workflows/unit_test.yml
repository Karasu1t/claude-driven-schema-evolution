name: Unit Tests - Glue Job Logic

on:
  push:
    paths:
      - "src/glue/**"
      - "tests/**"
    branches:
      - dev
      - main
  pull_request:
    paths:
      - "src/glue/**"
      - "tests/**"
  workflow_dispatch:

jobs:
  test:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push' || github.repository_owner == 'Karasu1t'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/requirements.txt

      - name: Run pytest
        run: |
          pytest tests/test_glue_job.py -v --tb=short 2>&1 | tee /tmp/ut_results.txt
        continue-on-error: true

      - name: Comment on PR with Test Results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const util_results = fs.readFileSync('/tmp/ut_results.txt', 'utf8');

            // Check if tests passed
            const passed = util_results.includes('passed');
            const failed = util_results.includes('failed');

            let status = passed && !failed ? '✅ PASSED' : '❌ FAILED';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🧪 Unit Test Results\n\n${status}\n\n\`\`\`\n${util_results}\n\`\`\``
            });
