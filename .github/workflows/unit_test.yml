name: Unit Tests - Glue Job Logic

on:
  push:
    paths:
      - "src/glue/**"
      - "tests/**"
    branches:
      - main
  pull_request:
    paths:
      - "src/glue/**"
      - "tests/**"
  workflow_dispatch:

jobs:
  test:
    if: github.actor == 'Karasu1t'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/requirements.txt

      - name: Run pytest
        run: |
          pytest tests/test_glue_job.py -v --tb=short
