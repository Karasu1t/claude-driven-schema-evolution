name: Terraform Destroy - Iceberg ETL Pipeline

on:
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: "Type 'confirm' to destroy infrastructure"
        required: true
        default: ""

jobs:
  terraform-destroy:
    if: github.actor == 'Karasu1t'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/env/dev/aws
    env:
      AWS_REGION: ap-northeast-1
    steps:
      - name: Confirm Destruction
        if: github.event.inputs.confirm_destroy != 'confirm'
        run: |
          echo "ERROR: Must type 'confirm' to destroy infrastructure"
          exit 1

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1

      - name: Write ~/.aws/credentials
        run: |
          mkdir -p ~/.aws
          {
            echo "[default]"
            echo "aws_access_key_id=${AWS_ACCESS_KEY_ID}"
            echo "aws_secret_access_key=${AWS_SECRET_ACCESS_KEY}"
            if [ -n "${AWS_SESSION_TOKEN:-}" ]; then
              echo "aws_session_token=${AWS_SESSION_TOKEN}"
            fi
          } > ~/.aws/credentials

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Destroy
        run: terraform destroy -auto-approve
