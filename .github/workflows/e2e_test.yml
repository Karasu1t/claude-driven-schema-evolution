name: E2E Test - Iceberg ETL Pipeline

on:
  workflow_dispatch:
    inputs:
      test_date:
        description: "Test date (YYYYMMDD format)"
        required: true
        default: "20260529"

env:
  AWS_REGION: ap-northeast-1
  TEST_CSV_DATE: ${{ github.event.inputs.test_date }}

jobs:
  test:
    if: github.actor == 'Karasu1t'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1

      - name: Create test CSV
        run: |
          python3 << 'EOF'
          import csv
          from datetime import datetime

          data = [
              ['video_title', 'views', 'channel_name', 'channel_subscribers', 'likes', 'video_duration_minutes'],
              ['test_video_1', '50000', 'TestChannel1', '100000', '5000', '10'],
              ['test_video_2', '75000', 'TestChannel2', '150000', '7500', '15'],
              ['test_video_3', '100000', 'TestChannel3', '200000', '10000', '20'],
          ]

          test_date = "${{ env.TEST_CSV_DATE }}"
          with open(f'test_data/sns_advertisement_{test_date}.csv', 'w', newline='') as f:
              writer = csv.writer(f)
              writer.writerows(data)

          print(f"✓ Created test CSV: sns_advertisement_{test_date}.csv")
          EOF

      - name: Upload test CSV to S3
        run: |
          TEST_DATE="${{ env.TEST_CSV_DATE }}"
          aws s3 cp "test_data/sns_advertisement_${TEST_DATE}.csv" \
            "s3://dev-karasuit-raw-bucket/sns_advertisement_${TEST_DATE}.csv"

      - name: Trigger Glue Job
        run: |
          TEST_DATE="${{ env.TEST_CSV_DATE }}"
          PAYLOAD='{"Records":[{"s3":{"bucket":{"name":"dev-karasuit-raw-bucket"},"object":{"key":"sns_advertisement_'${TEST_DATE}'.csv"}}}]}'

          RESPONSE=$(aws lambda invoke \
            --function-name dev-karasuit-glue-job-trigger \
            --payload "$(echo -n "$PAYLOAD" | base64)" \
            /tmp/response.json \
            --region ap-northeast-1)

          cat /tmp/response.json | jq .

      - name: Wait for Glue Job
        run: |
          echo "Waiting 90 seconds for Glue Job to complete..."
          sleep 90

      - name: Verify Iceberg Table
        run: |
          QUERY="SELECT COUNT(*) as row_count FROM dev_karasuit_iceberg_db.video_advertisement;"

          QUERY_ID=$(aws athena start-query-execution \
            --query-string "$QUERY" \
            --query-execution-context Database=dev_karasuit_iceberg_db \
            --result-configuration OutputLocation=s3://dev-karasuit-processed-bucket/ \
            --region ap-northeast-1 \
            --query 'QueryExecutionId' \
            --output text)

          # Wait for query to complete
          for i in {1..30}; do
            STATUS=$(aws athena get-query-execution \
              --query-execution-id "$QUERY_ID" \
              --region ap-northeast-1 \
              --query 'QueryExecution.Status.State' \
              --output text)
            
            if [ "$STATUS" = "SUCCEEDED" ]; then
              aws athena get-query-results --query-execution-id "$QUERY_ID" --region ap-northeast-1 | jq .
              break
            elif [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "CANCELLED" ]; then
              echo "✗ Query failed: $STATUS"
              exit 1
            fi
            
            sleep 2
          done
