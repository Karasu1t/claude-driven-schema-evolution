name: CI - PR Pipeline (UT → E2E)

on:
  pull_request:
    branches:
      - dev
      - main

permissions:
  pull-requests: write
  issues: write
  contents: read

jobs:
  unit-test:
    if: github.repository_owner == 'Karasu1t'
    uses: ./.github/workflows/unit_test.yml
    with:
      pr_number: ${{ github.event.pull_request.number }}

  terraform-apply:
    if: github.repository_owner == 'Karasu1t'
    uses: ./.github/workflows/terraform_apply.yml
    secrets: inherit

  e2e-test:
    if: github.repository_owner == 'Karasu1t'
    needs: [unit-test, terraform-apply]
    uses: ./.github/workflows/e2e_test.yml
    secrets: inherit
    with:
      pr_number: ${{ github.event.pull_request.number }}
