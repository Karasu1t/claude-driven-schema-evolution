name: E2E Test - Iceberg ETL Pipeline

on:
  workflow_dispatch:
    inputs:
      test_date:
        description: "Test date (YYYYMMDD format)"
        required: true
        default: "20260529"

env:
  AWS_REGION: ap-northeast-1
  TEST_CSV_DATE: ${{ github.event.inputs.test_date }}

jobs:
  test:
    if: github.actor == 'Karasu1t'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1

      - name: Upload test CSV to S3
        run: |
          TEST_DATE="${{ env.TEST_CSV_DATE }}"
          TEST_BUCKET="dev-karasuit-raw-bucket-test"

          # Test CSV is managed in Git as sns_advertisement_yyyymmdd.csv
          # Replace yyyymmdd with actual test date and upload to S3
          cp test_data/sns_advertisement_yyyymmdd.csv \
            /tmp/sns_advertisement_${TEST_DATE}.csv

          aws s3 cp "/tmp/sns_advertisement_${TEST_DATE}.csv" \
            "s3://${TEST_BUCKET}/sns_advertisement_${TEST_DATE}.csv" \
            --region ap-northeast-1
          echo "✓ Uploaded test CSV (yyyymmdd → ${TEST_DATE}) to S3 (test bucket)"

      - name: Trigger Glue Job
        run: |
          TEST_DATE="${{ env.TEST_CSV_DATE }}"
          TEST_RAW_BUCKET="dev-karasuit-raw-bucket-test"
          TEST_PROCESSED_BUCKET="dev-karasuit-processed-bucket-test"

          # Trigger Lambda with test bucket in payload
          PAYLOAD='{"Records":[{"s3":{"bucket":{"name":"'${TEST_RAW_BUCKET}'"},"object":{"key":"sns_advertisement_'${TEST_DATE}'.csv"}}}]}'

          RESPONSE=$(aws lambda invoke \
            --function-name dev-karasuit-glue-job-trigger \
            --payload "$(echo -n "$PAYLOAD" | base64)" \
            /tmp/response.json \
            --region ap-northeast-1)

          cat /tmp/response.json | jq .

      - name: Wait for Glue Job
        run: |
          echo "Waiting 90 seconds for Glue Job to complete..."
          sleep 90

      - name: Prepare expected output CSV
        run: |
          TEST_DATE="${{ env.TEST_CSV_DATE }}"
          # Convert YYYYMMDD to YYYY-MM-DD format
          PARTITION_DATE=$(date -d "${TEST_DATE:0:4}-${TEST_DATE:4:2}-${TEST_DATE:6:2}" +%Y-%m-%d)
          
          # Replace yyyy-mm-dd placeholder with actual partition date
          sed "s/yyyy-mm-dd/${PARTITION_DATE}/g" test_data/expected_output.csv > /tmp/expected_output.csv
          echo "✓ Prepared expected output (partition_date: ${PARTITION_DATE})"

      - name: Query Iceberg Table (Full Data)
        run: |
          TEST_DB="dev_karasuit_iceberg_db_test"
          TEST_RESULTS_BUCKET="dev-karasuit-processed-bucket-test"
          QUERY="SELECT * FROM ${TEST_DB}.video_advertisement ORDER BY video_title;"

          QUERY_ID=$(aws athena start-query-execution \
            --query-string "$QUERY" \
            --query-execution-context Database="${TEST_DB}" \
            --result-configuration "OutputLocation=s3://${TEST_RESULTS_BUCKET}/" \
            --region ap-northeast-1 \
            --query 'QueryExecutionId' \
            --output text)

          echo "Query ID: $QUERY_ID"
          echo "ATHENA_QUERY_ID=$QUERY_ID" >> $GITHUB_ENV

          # Wait for query to complete
          for i in {1..30}; do
            STATUS=$(aws athena get-query-execution \
              --query-execution-id "$QUERY_ID" \
              --region ap-northeast-1 \
              --query 'QueryExecution.Status.State' \
              --output text)
            
            if [ "$STATUS" = "SUCCEEDED" ]; then
              echo "✓ Query completed successfully"
              break
            elif [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "CANCELLED" ]; then
              echo "✗ Query failed: $STATUS"
              exit 1
            fi
            
            echo "Status: $STATUS (attempt $i/30)"
            sleep 2
          done

      - name: Download Athena Results
        run: |
          aws s3 cp "s3://dev-karasuit-processed-bucket-test/${ATHENA_QUERY_ID}.csv" \
            "/tmp/athena_result.csv" \
            --region ap-northeast-1 || echo "Standard result file not found, trying manifest"

          # If the above fails, try to find the actual result file
          if [ ! -f "/tmp/athena_result.csv" ]; then
            RESULT_FILES=$(aws s3 ls s3://dev-karasuit-processed-bucket-test/ \
              --recursive --region ap-northeast-1 | grep "$ATHENA_QUERY_ID" | grep -v ".txt" | awk '{print $NF}')
            
            if [ ! -z "$RESULT_FILES" ]; then
              FILE=$(echo "$RESULT_FILES" | head -1)
              aws s3 cp "s3://dev-karasuit-processed-bucket-test/$FILE" \
                "/tmp/athena_result.csv" \
                --region ap-northeast-1
            fi
          fi

          if [ -f "/tmp/athena_result.csv" ]; then
            echo "✓ Downloaded Athena results"
            head -5 /tmp/athena_result.csv
          else
            echo "✗ Failed to download Athena results"
            exit 1
          fi

      - name: Compare Results with Expected Values
        run: |
          python3 << 'EOF'
          import pandas as pd
          import sys

          # Read actual results from Athena
          try:
              actual_df = pd.read_csv('/tmp/athena_result.csv')
          except Exception as e:
              print(f"✗ Failed to read Athena results: {e}")
              sys.exit(1)

          # Read expected values
          try:
              expected_df = pd.read_csv('/tmp/expected_output.csv')
          except Exception as e:
              print(f"✗ Failed to read expected output: {e}")
              sys.exit(1)

          print("=" * 80)
          print("TEST RESULTS SUMMARY")
          print("=" * 80)

          # Check shape match
          if actual_df.shape != expected_df.shape:
              print(f"✗ Shape mismatch!")
              print(f"  Expected: {expected_df.shape[0]} rows × {expected_df.shape[1]} columns")
              print(f"  Actual: {actual_df.shape[0]} rows × {actual_df.shape[1]} columns")
              sys.exit(1)

          # Check column names
          if list(actual_df.columns) != list(expected_df.columns):
              print(f"✗ Column mismatch!")
              print(f"  Expected columns: {list(expected_df.columns)}")
              print(f"  Actual columns: {list(actual_df.columns)}")
              sys.exit(1)

          # Cell-by-cell comparison (excluding timestamp columns)
          mismatches = []
          skip_columns = ['processed_at']  # Skip dynamic columns

          for row_idx in range(expected_df.shape[0]):
              for col_name in expected_df.columns:
                  if col_name in skip_columns:
                      continue

                  expected_val = str(expected_df.loc[row_idx, col_name]).strip()
                  actual_val = str(actual_df.loc[row_idx, col_name]).strip()

                  if expected_val != actual_val:
                      mismatches.append({
                          'row': row_idx,
                          'column': col_name,
                          'expected': expected_val,
                          'actual': actual_val
                      })

          # Calculate statistics
          total_cells = (expected_df.shape[0] * len([c for c in expected_df.columns if c not in skip_columns]))
          ok_cells = total_cells - len(mismatches)

          print(f"\n📊 CELL-BY-CELL VERIFICATION")
          print(f"  Total cells checked: {total_cells}")
          print(f"  ✅ OK cells: {ok_cells}/{total_cells}")
          print(f"  ❌ NG cells: {len(mismatches)}")

          # Print actual data
          print(f"\n📋 ACTUAL DATA FROM ICEBERG")
          print(actual_df.to_string())

          # Print expected data
          print(f"\n📋 EXPECTED DATA")
          print(expected_df.to_string())

          if mismatches:
              print(f"\n❌ MISMATCHES FOUND:")
              for mismatch in mismatches:
                  print(f"  Row {mismatch['row']}, Column '{mismatch['column']}':")
                  print(f"    Expected: {mismatch['expected']}")
                  print(f"    Actual: {mismatch['actual']}")
              sys.exit(1)
          else:
              print(f"\n✅ ALL TESTS PASSED!")
              print("=" * 80)

          EOF
